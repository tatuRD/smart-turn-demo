<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="app-version" content="2026-05-03">
    <title>Smart Turn Browser Demo</title>
    <script>
      window.__APP_ASSET_VERSION__ = String(Math.floor(Date.now() / 1000));
      document.write(`<link rel="stylesheet" href="./styles.css?v=${window.__APP_ASSET_VERSION__}">`);
    </script>
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar" aria-label="Smart Turn controls">
        <div>
          <p class="eyebrow">Local ONNX inference</p>
          <h1>Smart Turn Demo</h1>
        </div>
        <div class="controls">
          <button id="startButton" type="button">Start</button>
          <button id="stopButton" type="button" disabled>Stop</button>
        </div>
      </section>

      <section class="status-grid" aria-label="Current status">
        <div class="metric threshold-metric">
          <label class="metric-label" for="vadThresholdSlider">VAD threshold</label>
          <strong id="vadThresholdText">0.20</strong>
          <input id="vadThresholdSlider" type="range" min="0" max="1" step="0.01" value="0.2" aria-describedby="vadThresholdText">
        </div>
        <div class="metric threshold-metric turn-threshold-metric">
          <label class="metric-label" for="turnThresholdSlider">Turn-taking threshold</label>
          <strong id="turnThresholdText">0.80</strong>
          <input id="turnThresholdSlider" type="range" min="0" max="1" step="0.01" value="0.8" aria-describedby="turnThresholdText">
        </div>
        <div class="metric">
          <span class="metric-label">SileroVAD avg</span>
          <strong id="vadAvgText">--</strong>
        </div>
        <div class="metric">
          <span class="metric-label">Smart Turn avg</span>
          <strong id="smartTurnAvgText">--</strong>
        </div>
        <div class="metric">
          <span class="metric-label">Feature avg</span>
          <strong id="featureAvgText">--</strong>
        </div>
        <div class="metric">
          <span class="metric-label">Backend</span>
          <strong id="backendText">--</strong>
        </div>
      </section>

      <section class="graph-panel" aria-label="Live graphs">
        <div class="graph-head">
          <div>
            <h2>Live signal</h2>
            <p id="detailText">マイクを許可して話すと、端末上だけでVADとSmart Turnを実行します。</p>
          </div>
        </div>
        <canvas id="graphCanvas" width="1200" height="620"></canvas>
      </section>
    </main>

    <script>
      document.write(`<script src="./vendor/ort.min.js?v=${window.__APP_ASSET_VERSION__}"><\/script>`);
      document.write(`<script src="./app.js?v=${window.__APP_ASSET_VERSION__}"><\/script>`);
    </script>
  </body>
</html>
